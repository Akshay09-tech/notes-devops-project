apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-app
  template:
    metadata:
      labels:
        app: notes-app
    spec:
      containers:
        - name: notes-app
          image: akshaychhallare/notes_app:v1
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: postgresql://notes_user:notes_password@postgres:5432/notes_db
